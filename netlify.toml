[build]
  functions = "netlify/functions"
  publish   = "."
  command   = "npm install"

[functions]
  node_bundler = "esbuild"

[functions."gripp-order"]
  timeout = 30

[functions."save-order"]
  timeout = 30

[functions."get-orders"]
  timeout = 30

[functions."get-bestand"]
  timeout = 30

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type, X-Admin-Secret"
    Access-Control-Allow-Methods = "POST, OPTIONS"

[[redirects]]
  from   = "/api/gripp-order"
  to     = "/.netlify/functions/gripp-order"
  status = 200
