[build]
  functions = "netlify/functions"
  publish   = "."
  command   = "npm install"

# CORS headers voor de API
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type, X-Admin-Secret"
    Access-Control-Allow-Methods = "POST, OPTIONS"

# Redirect /api/gripp-order → Netlify Function
[[redirects]]
  from   = "/api/gripp-order"
  to     = "/.netlify/functions/gripp-order"
  status = 200

[[redirects]]
  from   = "/api/test-gripp"
  to     = "/.netlify/functions/gripp-order"
  status = 200
